task: skill
content_source: readme
content_paths:
  - SKILL.md
  - README.md
content_fallback: description

metrics:
  - metric: coding_relevance
    weight: 0.25
  - metric: doc_completeness
    weight: 0.20
  - metric: desc_accuracy
    weight: 0.15
  - metric: writing_quality
    weight: 0.15
  - metric: specificity
    weight: 0.15
  - metric: install_clarity
    weight: 0.10

heuristic_signals:
  - signal: freshness
    weight: 0.30
  - signal: popularity
    weight: 0.30
  - signal: source_trust
    weight: 0.40

star_routing:
  zero_weight_sources:
    - antigravity-skills
    - ai-agent-skills
    - "davila7/*"
    - vasilyu-skills
    - anthropics-skills
    - "anthropics/claude-code"
  monorepo_threshold: 5

thresholds:
  accept: 65
  review: 50

# v2: 引入 install_popularity 健康信号（来自 skills.sh）；强制旧 cache 失效以重算混合分
rubric_major_version: 2
enrichment: true
