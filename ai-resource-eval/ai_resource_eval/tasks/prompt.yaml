task: prompt
content_source: readme
content_paths:
  - README.md
content_fallback: description

# No install_clarity or doc_completeness — weights redistributed proportionally
# Original: cr=0.25 da=0.15 wq=0.15 sp=0.15 (sum=0.70)
# After removing ic (0.10) + dc (0.20), redistribute: each_new = original / 0.70
metrics:
  - metric: coding_relevance
    weight: 0.36
  - metric: desc_accuracy
    weight: 0.22
  - metric: writing_quality
    weight: 0.21
  - metric: specificity
    weight: 0.21

heuristic_signals:
  - signal: freshness
    weight: 0.30
  - signal: popularity
    weight: 0.30
  - signal: source_trust
    weight: 0.40

star_routing:
  zero_weight_sources:
    - antigravity-skills
    - ai-agent-skills
    - "davila7/*"
    - vasilyu-skills
    - anthropics-skills
    - "anthropics/claude-code"
  monorepo_threshold: 5

thresholds:
  accept: 65
  review: 50

rubric_major_version: 1
