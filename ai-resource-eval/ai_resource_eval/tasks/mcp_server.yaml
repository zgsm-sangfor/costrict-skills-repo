task: mcp_server
content_source: readme
content_paths:
  - README.md
content_fallback: description

metrics:
  - metric: coding_relevance
    weight: 0.25
  - metric: doc_completeness
    weight: 0.20
  - metric: desc_accuracy
    weight: 0.15
  - metric: writing_quality
    weight: 0.15
  - metric: specificity
    weight: 0.15
  - metric: install_clarity
    weight: 0.10

heuristic_signals:
  - signal: freshness
    weight: 0.30
  - signal: popularity
    weight: 0.30
  - signal: source_trust
    weight: 0.40

star_routing:
  zero_weight_sources:
    - antigravity-skills
    - ai-agent-skills
    - "davila7/*"
    - vasilyu-skills
    - anthropics-skills
    - "anthropics/claude-code"
  monorepo_threshold: 5

thresholds:
  accept: 65
  review: 50

# v3: 在 MCP 评分调用中新增 mcp_installability 字段；强制旧 MCP cache 失效
rubric_major_version: 3
enrichment: true
mcp_installability: true
