name: Weekly Sync

on:
  schedule:
    - cron: "23 3 * * 1"  # Every Monday at 3:23 AM UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests
          pip install -e ai-resource-eval

      - name: Restore sync caches
        uses: actions/cache@v4
        with:
          path: |
            catalog/skills/.repo_cache.json
            catalog/skills/.llm_cache.json
            catalog/maintenance/incremental_recrawl_state.json
            scripts/fallback_skill_repos.json
            .eval_cache/
          key: sync-caches-${{ github.run_number }}
          restore-keys: |
            sync-caches-

      - name: Crawl mcp.so (incremental)
        run: python scripts/crawl_mcp_so.py --mode incremental
        timeout-minutes: 15
        continue-on-error: true

      - name: Sync MCP servers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_mcp.py
        continue-on-error: true

      - name: Sync Rules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_rules.py
        continue-on-error: true

      - name: Sync Skills
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_skills.py
        timeout-minutes: 30
        continue-on-error: true

      - name: Sync Prompts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_prompts.py
        continue-on-error: true

      - name: Verify sync produced data
        run: |
          fail=0
          for type_dir in mcp skills rules prompts; do
            f="catalog/${type_dir}/index.json"
            if [ ! -s "$f" ]; then
              echo "WARNING: $f is empty or missing"
              fail=$((fail + 1))
            fi
          done
          if [ "$fail" -ge 4 ]; then
            echo "ERROR: All sync sources failed, aborting merge"
            exit 1
          fi

      - name: Merge indexes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          EVAL_DRY_RUN: ${{ vars.EVAL_DRY_RUN || 'true' }}
          EVAL_INCREMENTAL: "true"
        run: python scripts/merge_index.py
        continue-on-error: true

      - name: Generate catalog sub-directory READMEs
        run: |
          if [ -s catalog/index.json ]; then
            python scripts/generate_catalog_readme.py
          else
            echo "Skipping: catalog/index.json missing or empty"
          fi

      - name: Update bilingual README files
        run: python scripts/update_readme.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog/ README.md README.zh-CN.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git stash --include-untracked
            git commit -m "[chore] 每周自动同步上游资源 $(date +%Y-%m-%d)"
            git pull --rebase
            git push
            git stash pop || true
          fi
