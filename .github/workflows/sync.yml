name: Weekly Sync

on:
  schedule:
    - cron: "23 3 * * 1"  # Every Monday at 3:23 AM UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Sync MCP servers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_mcp.py
        continue-on-error: true

      - name: Sync Rules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_rules.py
        continue-on-error: true

      - name: Sync Skills
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_EVAL_LIMIT: ${{ vars.LLM_EVAL_LIMIT || '200' }}
        run: python scripts/sync_skills.py
        timeout-minutes: 30
        continue-on-error: true

      - name: Sync Prompts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_prompts.py
        continue-on-error: true

      - name: Merge indexes
        run: python scripts/merge_index.py

      - name: Update README counts
        run: python scripts/update_readme.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog/ README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[chore] 每周自动同步上游资源 $(date +%Y-%m-%d)"
            git push
          fi
