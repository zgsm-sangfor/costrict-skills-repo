name: Weekly Sync

on:
  schedule:
    - cron: "23 3 * * 1"  # Every Monday at 3:23 AM UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests
          pip install -e ai-resource-eval

      # 计算每周时间戳，用于 cache key 周期性失效（与 mastra 上游同步节奏对齐）
      - name: Compute weekly cache stamp
        id: week
        run: echo "stamp=$(date -u +%Y-%U)" >> "$GITHUB_OUTPUT"

      - name: Restore sync caches
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            catalog/skills/.repo_cache.json
            catalog/skills/.llm_cache.json
            catalog/maintenance/incremental_recrawl_state.json
            scripts/fallback_skill_repos.json
            .eval_cache/
          # cache key 含每周时间戳：周一新一轮 sync 时强制失效，避免上游 stale snapshot
          key: sync-caches-${{ steps.week.outputs.stamp }}-${{ github.run_number }}
          restore-keys: |
            sync-caches-${{ steps.week.outputs.stamp }}-
            sync-caches-

      # skills.sh 缓存独立隔离：restore-keys 只含本周 stamp 前缀，禁止跨周回退。
      # 修复点（P2-2）：sync-caches- 兜底前缀会让新一周首次运行错误恢复上周 .skills_sh_cache/，
      # 上游 fetch 失败时 sync_skills_sh.py 会复用旧 snapshot，weekly stamp 失效语义被破坏。
      - name: Restore skills.sh weekly cache
        id: cache-restore-skills-sh
        uses: actions/cache/restore@v4
        with:
          path: |
            .skills_sh_cache/
          key: skills-sh-cache-${{ steps.week.outputs.stamp }}-${{ github.run_number }}
          restore-keys: |
            skills-sh-cache-${{ steps.week.outputs.stamp }}-

      # MCP registry 缓存独立隔离：restore-keys 仅本周 stamp 前缀，禁止跨周回退
      - name: Restore MCP registry weekly cache
        id: cache-restore-mcp-registry
        uses: actions/cache/restore@v4
        with:
          path: |
            .mcp_registry_cache/
          key: mcp-registry-cache-${{ steps.week.outputs.stamp }}-${{ github.run_number }}
          restore-keys: |
            mcp-registry-cache-${{ steps.week.outputs.stamp }}-

      # windsurfrules 缓存独立隔离：同上
      - name: Restore windsurfrules weekly cache
        id: cache-restore-windsurfrules
        uses: actions/cache/restore@v4
        with:
          path: |
            .windsurfrules_cache/
          key: windsurfrules-cache-${{ steps.week.outputs.stamp }}-${{ github.run_number }}
          restore-keys: |
            windsurfrules-cache-${{ steps.week.outputs.stamp }}-

      - name: Crawl mcp.so (incremental)
        run: python scripts/crawl_mcp_so.py --mode incremental
        timeout-minutes: 15
        continue-on-error: true

      - name: Sync MCP servers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_mcp.py
        continue-on-error: true

      - name: Sync MCP registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_mcp_registry.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Sync Rules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_rules.py
        continue-on-error: true

      - name: Sync awesome-windsurfrules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_windsurfrules.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Sync Skills
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_skills.py
        timeout-minutes: 30
        continue-on-error: true

      # skills.sh Tier 1 源：拉取 mastra-ai/skills-api 静态 JSON，零 rate limit
      # 失败兜底：continue-on-error 保证 merge_index 仍能基于已有 skills_sh_index.json 跑
      - name: Sync skills.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_skills_sh.py
        timeout-minutes: 10
        continue-on-error: true

      - name: Sync Prompts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync_prompts.py
        continue-on-error: true

      - name: Verify sync produced data
        run: |
          fail=0
          for type_dir in mcp skills rules prompts; do
            f="catalog/${type_dir}/index.json"
            if [ ! -s "$f" ]; then
              echo "WARNING: $f is empty or missing"
              fail=$((fail + 1))
            fi
          done
          if [ "$fail" -ge 4 ]; then
            echo "ERROR: All sync sources failed, aborting merge"
            exit 1
          fi

      - name: Merge indexes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          EVAL_DRY_RUN: ${{ vars.EVAL_DRY_RUN || 'true' }}
          EVAL_INCREMENTAL: "true"
        run: python scripts/merge_index.py
        continue-on-error: true

      - name: Generate catalog sub-directory READMEs
        run: |
          if [ -s catalog/index.json ]; then
            python scripts/generate_catalog_readme.py
          else
            echo "Skipping: catalog/index.json missing or empty"
          fi

      - name: Update bilingual README files
        run: python scripts/update_readme.py

      # 覆盖率审计：对照 popular_skills_expected.yaml 检查热门 skill 命中状态
      # 当前脚本尚未实现（Section 8），continue-on-error 保证不阻断主流程
      - name: Audit popular skill coverage
        run: |
          if [ -f scripts/audit_popular_coverage.py ]; then
            python scripts/audit_popular_coverage.py
          else
            echo "INFO: scripts/audit_popular_coverage.py 尚未实现，跳过覆盖率审计"
          fi
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog/ README.md README.zh-CN.md
          # docs/coverage_report.md 在 gitignore 中，需要 -f 才能纳入 commit
          git add -f docs/coverage_report.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[chore] 每周自动同步上游资源 $(date +%Y-%m-%d)"
            git stash --include-untracked
            git pull --rebase
            git push
            git stash pop || true
          fi

      - name: Save sync caches
        uses: actions/cache/save@v4
        if: always() && steps.cache-restore.outputs.cache-hit != 'true'
        with:
          path: |
            catalog/skills/.repo_cache.json
            catalog/skills/.llm_cache.json
            catalog/maintenance/incremental_recrawl_state.json
            scripts/fallback_skill_repos.json
            .eval_cache/
          # 与 restore 一致：含每周时间戳，确保 stale 快照随周失效
          key: sync-caches-${{ steps.week.outputs.stamp }}-${{ github.run_number }}

      # skills.sh 缓存独立 save：与 restore 对齐，仅 weekly stamp 前缀
      - name: Save skills.sh weekly cache
        uses: actions/cache/save@v4
        if: always() && steps.cache-restore-skills-sh.outputs.cache-hit != 'true'
        with:
          path: |
            .skills_sh_cache/
          key: skills-sh-cache-${{ steps.week.outputs.stamp }}-${{ github.run_number }}

      - name: Save MCP registry weekly cache
        uses: actions/cache/save@v4
        if: always() && steps.cache-restore-mcp-registry.outputs.cache-hit != 'true'
        with:
          path: |
            .mcp_registry_cache/
          key: mcp-registry-cache-${{ steps.week.outputs.stamp }}-${{ github.run_number }}

      - name: Save windsurfrules weekly cache
        uses: actions/cache/save@v4
        if: always() && steps.cache-restore-windsurfrules.outputs.cache-hit != 'true'
        with:
          path: |
            .windsurfrules_cache/
          key: windsurfrules-cache-${{ steps.week.outputs.stamp }}-${{ github.run_number }}
