  - name: microsoft/playwright-mcp
    github_repo: microsoft/playwright-mcp
    reason: "微软官方 Playwright MCP，registry 与 wong2 awesome 都收录，浏览器自动化主力"
  - name: GLips/Figma-Context-MCP
    github_repo: GLips/Figma-Context-MCP
    reason: "Figma 设计上下文 MCP，前端设计协作高频 server"
  - name: github/github-mcp-server
    github_repo: github/github-mcp-server
    reason: "GitHub 官方 MCP server，issue/PR/repo 操作全覆盖"
  - name: cloudflare/mcp-server-cloudflare
    github_repo: cloudflare/mcp-server-cloudflare
    reason: "Cloudflare 官方 MCP，覆盖 Workers / R2 / KV 等服务"
  - name: supabase-community/supabase-mcp
    github_repo: supabase-community/supabase-mcp
    reason: "Supabase 社区维护的官方 MCP server"
  - name: sooperset/mcp-atlassian
    github_repo: sooperset/mcp-atlassian
    reason: "Atlassian (Jira/Confluence) MCP，registry 与社区都广泛使用"

expected_rules:
  - name: PatrickJS/awesome-cursorrules
    github_repo: PatrickJS/awesome-cursorrules
    reason: "最权威 Cursor rules 集合，社区事实标准"
